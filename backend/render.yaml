services:
  - type: web
    name: ai-agent-backend
    env: python
    region: oregon          # free-tier region; change to singapore/frankfurt if needed
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: GROQ_API_KEY
        sync: false         # set manually in Render dashboard — never hardcode

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false         # service-role key (server-side only — keep secret)

      - key: FRONTEND_URL
        sync: false         # your Vercel deployment URL, e.g. https://ai-agent.vercel.app

      - key: ALLOWED_ORIGINS
        sync: false         # comma-separated; defaults to localhost:3000

      - key: ENVIRONMENT
        value: production
